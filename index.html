<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>XPH Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>.spin{animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.fade-in{animation:fadeIn 0.3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}.btn-disabled{opacity:.4;cursor:not-allowed;pointer-events:none}</style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
<div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
<div class="flex items-center gap-3"><div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600"></div><span class="font-bold text-lg tracking-tight">XPH Dashboard</span></div>
<div class="flex items-center gap-3"><span id="netBadge" class="hidden text-xs font-medium px-2.5 py-1 rounded-full bg-green-100 text-green-700">Polygon</span><span id="addrLabel" class="hidden text-xs font-mono bg-gray-100 px-3 py-1.5 rounded-full text-gray-600"></span><button id="connectBtn" onclick="connectWallet()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white text-sm font-medium px-4 py-2 rounded-lg transition-all">Connect OKX Wallet</button></div>
</div>
</header>
<main class="max-w-6xl mx-auto px-5 py-8">
<div id="noWallet" class="flex flex-col items-center justify-center py-32 text-center">
<div class="w-20 h-20 rounded-full bg-indigo-50 flex items-center justify-center text-4xl mb-5">🔗</div>
<h2 class="text-2xl font-bold mb-2">Connect your OKX Wallet</h2>
<p class="text-gray-500 mb-6 text-sm">Auto-loads bond &amp; energy data after connecting</p>
<button onclick="connectWallet()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-3 rounded-xl transition">Connect OKX Wallet</button>
</div>
<div id="dashboard" class="hidden fade-in">
<div class="flex items-center justify-between mb-6">
<p class="text-sm text-gray-500">Address: <span id="fullAddr" class="font-mono text-gray-700"></span></p>
<button onclick="loadAllData()" id="refreshBtn" class="flex items-center gap-1.5 text-sm border border-gray-200 bg-white hover:bg-gray-50 px-3 py-2 rounded-lg transition text-gray-600"><svg id="refreshIcon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Refresh</button>
</div>
<section class="mb-8"><div class="flex items-center gap-2 mb-4"><span class="w-1.5 h-5 rounded bg-indigo-500"></span><h2 class="font-semibold text-base">Long-term Liquidity Bonds</h2></div><div id="bondsWrap" class="space-y-4"></div></section>
<section><div class="flex items-center gap-2 mb-4"><span class="w-1.5 h-5 rounded bg-amber-400"></span><h2 class="font-semibold text-base">Energy Value (Staking Records)</h2></div><div id="energyWrap"></div></section>
</div>
</main>
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-sm text-white font-medium shadow-2xl z-50 transition-all duration-300 opacity-0 pointer-events-none whitespace-nowrap"></div>
<script>
const POLYGON_ID='0x89';
const BOND_CONTRACTS=[{label:'600-day Bond',addr:'0x9b081323d11a2a61f43701a4007a4a98357c57a1'},{label:'360-day Bond',addr:'0x6c0ac888b075c6b5141cbc1da6170b6686afd07d'}];
const ENERGY_ADDR='0x25a4b842cb200e9148ff5a11babf80488c8d8b07';
const SXPH_ADDR='0x99a57e6c8558bc6689f894e068733adf83c19725';
const BOND_ABI=['function getBondInfoData(address) view returns (tuple(address owner,uint256 id,uint256 payout,uint256 vesting,uint256 lastBlock,uint256 pricePaid)[])', 'function pendingPayoutFor(address,uint256,bool) view returns (uint256)'];
let provider,signer,userAddr;
async function connectWallet(){
const okx=window.okxwallet||window.ethereum;
if(!okx){toast('Please install OKX Wallet','err');return;}
try{
provider=new ethers.providers.Web3Provider(okx,'any');
await provider.send('eth_requestAccounts',[]);
try{await okx.request({method:'wallet_switchEthereumChain',params:[{chainId:POLYGON_ID}]});}
catch(e){if(e.code===4902)await okx.request({method:'wallet_addEthereumChain',params:[{chainId:POLYGON_ID,chainName:'Polygon Mainnet',nativeCurrency:{name:'MATIC',symbol:'MATIC',decimals:18},rpcUrls:['https://polygon-rpc.com','https://1rpc.io/matic'],blockExplorerUrls:['https://polygonscan.com']}]});}
provider=new ethers.providers.Web3Provider(okx,'any');signer=provider.getSigner();userAddr=await signer.getAddress();
document.getElementById('addrLabel').textContent=userAddr.slice(0,6)+'...'+userAddr.slice(-4);
document.getElementById('addrLabel').classList.remove('hidden');
document.getElementById('netBadge').classList.remove('hidden');
const btn=document.getElementById('connectBtn');btn.textContent='Connected';btn.disabled=true;
btn.className=btn.className.replace('bg-indigo-600 hover:bg-indigo-700','bg-gray-300 cursor-default');
document.getElementById('noWallet').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
document.getElementById('fullAddr').textContent=userAddr;
okx.on('accountsChanged',()=>location.reload());okx.on('chainChanged',()=>location.reload());
await loadAllData();
}catch(e){toast('Connection failed: '+(e.message||e),'err');}
}
async function loadAllData(){
document.getElementById('bondsWrap').innerHTML='';document.getElementById('energyWrap').innerHTML='';
const icon=document.getElementById('refreshIcon');icon.classList.add('spin');
await Promise.all([loadBonds(provider),loadEnergy(provider)]);
icon.classList.remove('spin');
}
async function loadBonds(rp){
const wrap=document.getElementById('bondsWrap');
for(const bc of BOND_CONTRACTS){
const card=mkCard(bc.label,bc.addr,bc.addr);wrap.appendChild(card);
try{
const c=new ethers.Contract(bc.addr,BOND_ABI,rp);
const bonds=await c.getBondInfoData(userAddr);
if(!bonds.length){setBody(bc.addr,emptyRow('No bond records for this contract'));continue;}
const rows=await Promise.all(bonds.map(async(b,i)=>({i,claimable:await c.pendingPayoutFor(userAddr,i,false)})));
renderBonds(bc.addr,rows);
}catch{setBody(bc.addr,emptyRow('Contract incompatible or no data',true));}
}
}
function renderBonds(addr,rows){
const tbody=rows.map(r=>`<tr class="border-t border-gray-100 hover:bg-gray-50 transition"><td class="py-3 px-4 font-mono text-sm text-gray-500">#${r.i}</td><td class="py-3 px-4 text-right text-sm font-semibold text-indigo-600">${fmt(r.claimable)}</td><td class="py-3 px-4 text-right"><button onclick="txBondInterest('${addr}',${r.i})" class="mr-1.5 px-3 py-1 text-xs rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 border border-amber-200 font-medium transition">Claim Interest</button><button onclick="txBondClaim('${addr}',${r.i})" class="px-3 py-1 text-xs rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200 font-medium transition">Claim</button></td></tr>`).join('');
setBody(addr,`<table class="w-full"><thead><tr class="text-xs text-gray-400 uppercase"><th class="py-2 px-4 text-left font-medium">Bond</th><th class="py-2 px-4 text-right font-medium">Claimable (XPH)</th><th class="py-2 px-4 text-right font-medium">Actions</th></tr></thead><tbody>${tbody}</tbody></table>`);
}
function enc(sel,types,vals){return sel+ethers.utils.defaultAbiCoder.encode(types,vals).slice(2);}
async function loadEnergy(rp){
const wrap=document.getElementById('energyWrap');
const card=mkCard('Energy Contract',ENERGY_ADDR,'energy');wrap.appendChild(card);
try{
const rc=(to,data)=>rp.call({to,data});
const count=ethers.BigNumber.from(await rc(ENERGY_ADDR,enc('0x98dc8dea',['address'],[userAddr]))).toNumber();
if(count===0){setBody('energy',emptyRow('No energy records'));return;}
const records=[];
for(let off=0;off<count;off+=10){
const lim=Math.min(10,count-off);
const raw=await rc(ENERGY_ADDR,enc('0x297a52d2',['address','uint256','uint256'],[userAddr,off,lim]));
const body=raw.slice(2+64+64);
for(let i=0;i<lim;i++){
const slot=body.slice(i*512,(i+1)*512);
const claimed=ethers.BigNumber.from('0x'+slot.slice(0,64));
const id='0x'+slot.slice(64,128);const idx=off+i;
const principal=ethers.BigNumber.from(await rc(ENERGY_ADDR,enc('0xda709204',['address','uint256'],[userAddr,idx])));
const pending=ethers.BigNumber.from(await rc(SXPH_ADDR,enc('0x7965d56d',['bytes32'],[id])));
const interest=pending.gte(claimed)?pending.sub(claimed):ethers.BigNumber.from(0);
records.push({idx,id,principal,interest});
}
}
renderEnergy(records);
}catch(e){setBody('energy',emptyRow('Load failed: '+e.message.slice(0,60),true));}
}
function renderEnergy(records){
const tbody=records.map(r=>`<tr class="border-t border-gray-100 hover:bg-gray-50 transition"><td class="py-3 px-4 font-mono text-sm text-gray-500">#${r.idx}</td><td class="py-3 px-4 text-right text-sm font-semibold text-green-600">${fmt(r.principal)}</td><td class="py-3 px-4 text-right text-sm font-semibold text-amber-600">${fmt(r.interest)}</td><td class="py-3 px-4 text-right"><button onclick="txEnergyPrincipal(${r.idx})" class="mr-1.5 px-3 py-1 text-xs rounded-lg bg-green-50 text-green-600 hover:bg-green-100 border border-green-200 font-medium transition${r.principal.gt(0)?'':' btn-disabled'}">Claim Principal</button><button onclick="txEnergyInterest(${r.idx},'${r.interest.toString()}')" class="px-3 py-1 text-xs rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 border border-amber-200 font-medium transition">Claim Interest</button></td></tr>`).join('');
setBody('energy',`<table class="w-full"><thead><tr class="text-xs text-gray-400 uppercase"><th class="py-2 px-4 text-left font-medium">Record</th><th class="py-2 px-4 text-right font-medium">Redeem Principal (XPH)</th><th class="py-2 px-4 text-right font-medium">Claim Interest (XPH)</th><th class="py-2 px-4 text-right font-medium">Actions</th></tr></thead><tbody>${tbody}</tbody></table>`);
}
async function txBondInterest(addr,idx){await sendTx(addr,enc('0x2eb375ea',['uint256'],[idx]),'Claim Interest');}
async function txBondClaim(addr,idx){await sendTx(addr,enc('0x4458a14c',['address','uint256','bool'],[userAddr,idx,false]),'Claim');}
async function txEnergyPrincipal(idx){await sendTx(ENERGY_ADDR,enc('0xd9f0f7f5',['uint256'],[idx]),'Claim Principal');}
async function txEnergyInterest(idx,amtStr){await sendTx(ENERGY_ADDR,enc('0xd286f3cf',['uint256','uint256'],[idx,amtStr]),'Claim Interest');}
async function sendTx(to,data,label){
if(!signer){toast('Please connect wallet first','err');return;}
try{
toast(label+': Waiting for confirmation...','info');
const tx=await signer.sendTransaction({to,data,gasLimit:ethers.BigNumber.from(300000)});
toast(label+': Tx sent, confirming...','info');
await tx.wait();
toast('✓ '+label+' success!','ok');
setTimeout(loadAllData,1500);
}catch(e){toast('✗ '+label+' failed: '+(e?.reason||e?.message||'').slice(0,60),'err');}
}
function mkCard(label,addr,key){
const d=document.createElement('div');
d.className='bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden fade-in';
d.innerHTML=`<div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100"><div class="flex items-center gap-2"><span class="font-semibold text-sm">${label}</span><span class="text-xs text-gray-400 font-mono">${addr.slice(0,6)}…${addr.slice(-4)}</span></div><svg id="sp-${key}" class="spin w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10" opacity="0.3"/><path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></div><div id="bd-${key}" class="py-3 text-center text-sm text-gray-400">Loading...</div>`;
return d;
}
function setBody(key,html){const sp=document.getElementById('sp-'+key);const bd=document.getElementById('bd-'+key);if(sp)sp.style.display='none';if(bd){bd.className='';bd.innerHTML=html;}}
function emptyRow(msg,isErr=false){return `<p class="py-5 text-center text-sm ${isErr?'text-red-400':'text-gray-400'}">${msg}</p>`;}
function fmt(v){try{const n=parseFloat(ethers.utils.formatUnits(v,9));return n.toLocaleString('en-US',{minimumFractionDigits:4,maximumFractionDigits:6});}catch{return '—';}}
let toastTimer;
function toast(msg,type='info'){const el=document.getElementById('toast');const cls={ok:'bg-emerald-500',err:'bg-red-500',info:'bg-indigo-500'};el.textContent=msg;el.style.background='';el.className=`fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-xl text-sm text-white font-medium shadow-2xl z-50 transition-all duration-300 whitespace-nowrap ${cls[type]||cls.info}`;el.style.opacity='1';clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity='0';},4500);}
window.addEventListener('load',async()=>{const okx=window.okxwallet||window.ethereum;if(!okx)return;try{const accs=await okx.request({method:'eth_accounts'});if(accs.length)connectWallet();}catch{}});
</script>
</body>
</html>
